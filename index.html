<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Pink Clock Tower AR</title>

  <!-- Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@100;200;300&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --rose:    #f2afc9;
      --deep:    #1a0a12;
      --mid:     #2e1020;
      --gold:    #e8c97e;
      --muted:   rgba(242,175,201,0.18);
      --blur:    rgba(26,10,18,0.72);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep);
      font-family: 'Josefin Sans', sans-serif;
    }

    /* ── GRAIN OVERLAY ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* ══════════════════════════════════════════════════
       START SCREEN
    ══════════════════════════════════════════════════ */
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 90% at 50% 60%, #3d1530 0%, var(--deep) 70%);
      transition: opacity .8s ease, visibility .8s ease;
    }
    #start-screen.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    /* floating particles */
    .particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--rose);
      opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: .6; }
      90%  { opacity: .3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .start-inner {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      letter-spacing: .45em;
      font-size: .65rem;
      color: var(--rose);
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 1.6rem;
      animation: fade-in 1.2s ease both;
    }

    .title-block {
      position: relative;
      margin-bottom: 2.2rem;
    }
    .title-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 10vw, 4.2rem);
      line-height: 1.05;
      color: #fff;
      animation: fade-in 1.2s .15s ease both;
    }
    .title-block h1 em {
      font-style: italic;
      color: var(--rose);
    }
    .title-decor {
      display: block;
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 1rem auto .8rem;
      animation: expand-line .8s .5s ease both;
    }
    @keyframes expand-line {
      from { width: 0; opacity: 0; }
      to   { width: 40px; opacity: 1; }
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(.95rem, 3.5vw, 1.1rem);
      color: rgba(255,255,255,.45);
      letter-spacing: .05em;
      animation: fade-in 1s .5s ease both;
    }

    /* clock illustration */
    .clock-svg {
      width: 130px; height: 130px;
      margin-bottom: 2.6rem;
      animation: fade-in .8s .3s ease both, pulse-glow 3s 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(242,175,201,.4));
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(242,175,201,.3)); }
      50%       { filter: drop-shadow(0 0 30px rgba(242,175,201,.7)); }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CTA button */
    .btn-start {
      position: relative;
      display: inline-flex; align-items: center; gap: .7rem;
      padding: 1rem 2.4rem;
      border: 1px solid rgba(242,175,201,.35);
      background: transparent;
      color: #fff;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: .8rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: border-color .3s, color .3s;
      animation: fade-in 1s .8s ease both;
    }
    .btn-start::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--rose);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .45s cubic-bezier(.76,0,.24,1);
      z-index: 0;
    }
    .btn-start:hover::before, .btn-start:active::before { transform: scaleX(1); }
    .btn-start:hover, .btn-start:active { color: var(--deep); border-color: var(--rose); }
    .btn-start span, .btn-start svg { position: relative; z-index: 1; }

    .btn-start .icon-camera {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .hint {
      margin-top: 1.8rem;
      font-size: .6rem;
      letter-spacing: .2em;
      color: rgba(255,255,255,.2);
      text-transform: uppercase;
      animation: fade-in 1s 1.2s ease both;
    }

    /* ══════════════════════════════════════════════════
       AR / MODEL VIEWER WRAPPER
    ══════════════════════════════════════════════════ */
    #ar-wrapper {
      position: fixed; inset: 0; z-index: 10;
      opacity: 0; visibility: hidden;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #ar-wrapper.visible {
      opacity: 1; visibility: visible;
    }

    model-viewer {
      width: 100%; height: 100%;
      --poster-color: transparent;
      background: transparent;
    }

    /* custom AR button slot */
    #ar-btn-slot {
      position: absolute;
      bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: .55rem;
      padding: .85rem 2rem;
      background: var(--blur);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(242,175,201,.3);
      color: #fff;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: .75rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
    }
    #ar-btn-slot svg {
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════
       AUDIO BUTTON (corner)
    ══════════════════════════════════════════════════ */
    #audio-btn {
      position: fixed;
      bottom: 2rem; right: 1.2rem;
      z-index: 200;
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(242,175,201,.45);
      background: var(--blur);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(242,175,201,.4);
      transition: box-shadow .3s, border-color .3s;
      opacity: 0; visibility: hidden;
      transition: opacity .5s ease, visibility .5s ease, box-shadow .3s, border-color .3s;
    }
    #audio-btn.show {
      opacity: 1; visibility: visible;
    }
    #audio-btn.playing {
      border-color: var(--rose);
      box-shadow: 0 0 0 6px rgba(242,175,201,.15), 0 0 22px rgba(242,175,201,.3);
      animation: ring-pulse 1.8s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { box-shadow: 0 0 0 6px rgba(242,175,201,.1), 0 0 22px rgba(242,175,201,.25); }
      50%      { box-shadow: 0 0 0 12px rgba(242,175,201,.04), 0 0 34px rgba(242,175,201,.4); }
    }
    #audio-btn svg {
      width: 22px; height: 22px;
      stroke: var(--rose); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .2s;
    }
    #audio-btn:active svg { transform: scale(.88); }

    /* audio label */
    #audio-label {
      position: fixed;
      bottom: 3.8rem; right: 4.8rem;
      z-index: 200;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: .55rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--rose);
      opacity: 0; visibility: hidden;
      transition: opacity .5s .2s ease, visibility .5s .2s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    #audio-label.show { opacity: .75; visibility: visible; }

    /* back button */
    #back-btn {
      position: fixed;
      top: 1.2rem; left: 1.2rem;
      z-index: 200;
      display: flex; align-items: center; gap: .5rem;
      padding: .55rem 1rem;
      border: 1px solid rgba(242,175,201,.2);
      background: var(--blur);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,.6);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200; font-size: .6rem;
      letter-spacing: .25em; text-transform: uppercase;
      cursor: pointer; border-radius: 2px;
      opacity: 0; visibility: hidden;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #back-btn.show { opacity: 1; visibility: visible; }
    #back-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* toast notification */
    #toast {
      position: fixed;
      top: 5rem; left: 50%; transform: translateX(-50%);
      z-index: 300;
      padding: .6rem 1.4rem;
      background: var(--blur);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(242,175,201,.2);
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200; font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.75);
      opacity: 0;
      transition: opacity .4s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ══ START SCREEN ══════════════════════════════════ -->
<div id="start-screen">
  <div class="particles" id="particles"></div>

  <div class="start-inner">
    <span class="eyebrow">Experiencia aumentada</span>

    <!-- decorative clock SVG -->
    <svg class="clock-svg" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="65" cy="65" r="54" stroke="#f2afc9" stroke-width="1.5" opacity=".25"/>
      <circle cx="65" cy="65" r="44" stroke="#f2afc9" stroke-width="1"/>
      <circle cx="65" cy="65" r="3" fill="#f2afc9"/>
      <!-- tick marks -->
      <g stroke="#f2afc9" stroke-width="1" opacity=".5">
        <line x1="65" y1="23" x2="65" y2="30"/>
        <line x1="65" y1="100" x2="65" y2="107"/>
        <line x1="23" y1="65" x2="30" y2="65"/>
        <line x1="100" y1="65" x2="107" y2="65"/>
      </g>
      <!-- hour hand -->
      <line x1="65" y1="65" x2="65" y2="42" stroke="#e8c97e" stroke-width="2" stroke-linecap="round"/>
      <!-- minute hand -->
      <line x1="65" y1="65" x2="82" y2="62" stroke="#f2afc9" stroke-width="1.5" stroke-linecap="round"/>
      <!-- tower silhouette -->
      <rect x="58" y="12" width="14" height="10" rx="1" stroke="#f2afc9" stroke-width="1" fill="none" opacity=".4"/>
      <path d="M62 12 L65 5 L68 12" stroke="#f2afc9" stroke-width="1" fill="none" opacity=".4"/>
    </svg>

    <div class="title-block">
      <h1>Reloj<br/><em>Monumental</em></h1>
      <span class="title-decor"></span>
      <p class="subtitle">Una experiencia en realidad aumentada</p>
    </div>

    <button class="btn-start" id="startBtn">
      <svg class="icon-camera" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Comenzar experiencia</span>
    </button>

    <p class="hint">Requiere cámara · Mejor en Android</p>
  </div>
</div>

<!-- ══ AR WRAPPER ════════════════════════════════════ -->
<div id="ar-wrapper">
  <model-viewer
    id="viewer"
    src="clock_tower.glb"
    alt="Pink Clock Tower"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1.1"
    environment-image="neutral"
  >
    <!-- slot AR button personalizado -->
    <button slot="ar-button" id="ar-btn-slot">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Ver en tu espacio
    </button>
  </model-viewer>
</div>

<!-- ══ AUDIO BUTTON ══════════════════════════════════ -->
<span id="audio-label">Música</span>
<button id="audio-btn" aria-label="Reproducir audio">
  <svg id="icon-play" viewBox="0 0 24 24">
    <polygon points="5 3 19 12 5 21 5 3"/>
  </svg>
  <svg id="icon-pause" viewBox="0 0 24 24" style="display:none">
    <line x1="6" y1="4" x2="6" y2="20"/>
    <line x1="18" y1="4" x2="18" y2="20"/>
  </svg>
</button>

<!-- ══ BACK BUTTON ═══════════════════════════════════ -->
<button id="back-btn">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Volver
</button>

<!-- ══ TOAST ═════════════════════════════════════════ -->
<div id="toast" id="toast"></div>

<!-- ══ AUDIO ELEMENT ═════════════════════════════════ -->
<!-- 
  Agrega un archivo de audio llamado "audio.mp3" en la misma carpeta
  que este index.html para que el botón funcione.
-->
<audio id="bgAudio" src="audio.mp3" loop></audio>

<script>
  // ── Particles ────────────────────────────────────
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 3 + 1.5}px;
      height: ${Math.random() * 3 + 1.5}px;
      animation-duration: ${Math.random() * 8 + 6}s;
      animation-delay: ${Math.random() * 8}s;
    `;
    pContainer.appendChild(p);
  }

  // ── Elements ─────────────────────────────────────
  const startScreen = document.getElementById('start-screen');
  const startBtn    = document.getElementById('startBtn');
  const arWrapper   = document.getElementById('ar-wrapper');
  const viewer      = document.getElementById('viewer');
  const audioBtnEl  = document.getElementById('audio-btn');
  const audioLabel  = document.getElementById('audio-label');
  const backBtn     = document.getElementById('back-btn');
  const bgAudio     = document.getElementById('bgAudio');
  const iconPlay    = document.getElementById('icon-play');
  const iconPause   = document.getElementById('icon-pause');
  const toast       = document.getElementById('toast');

  let audioReady = false;

  // ── Toast helper ─────────────────────────────────
  function showToast(msg, duration = 2800) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
  }

  // ── Start experience ─────────────────────────────
  startBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    arWrapper.classList.add('visible');
    audioBtnEl.classList.add('show');
    audioLabel.classList.add('show');
    backBtn.classList.add('show');

    // Auto-activate AR after short delay so model loads
    setTimeout(() => {
      if (viewer.canActivateAR) {
        viewer.activateAR();
        showToast('Apunta tu cámara al suelo');
      } else {
        showToast('Usa el botón "Ver en tu espacio"');
      }
    }, 800);
  });

  // ── Back button ──────────────────────────────────
  backBtn.addEventListener('click', () => {
    startScreen.classList.remove('hidden');
    arWrapper.classList.remove('visible');
    audioBtnEl.classList.remove('show');
    audioLabel.classList.remove('show');
    backBtn.classList.remove('show');

    bgAudio.pause();
    bgAudio.currentTime = 0;
    audioBtnEl.classList.remove('playing');
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
  });

  // ── Audio button ─────────────────────────────────
  audioBtnEl.addEventListener('click', async () => {
    if (bgAudio.paused) {
      try {
        await bgAudio.play();
        audioBtnEl.classList.add('playing');
        iconPlay.style.display = 'none';
        iconPause.style.display = '';
      } catch (e) {
        showToast('No se pudo reproducir el audio');
        console.error('Audio error:', e);
      }
    } else {
      bgAudio.pause();
      audioBtnEl.classList.remove('playing');
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
    }
  });

  // Handle audio error gracefully
  bgAudio.addEventListener('error', () => {
    audioReady = false;
  });
  bgAudio.addEventListener('canplay', () => {
    audioReady = true;
  });

  // ── model-viewer AR events ───────────────────────
  viewer.addEventListener('ar-status', (e) => {
    if (e.detail.status === 'session-started') {
      showToast('AR activo · Mueve el teléfono', 3500);
    }
    if (e.detail.status === 'failed') {
      showToast('AR no disponible en este dispositivo');
    }
  });
</script>
</body>
</html>
